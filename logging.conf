[loggers]
keys=root,nds.websocket,nds.instances,nds.commands,nds.mirrors

[handlers]
keys=consoleHandler

[formatters]
keys=simpleFormatter

[logger_root]
level=DEBUG
handlers=consoleHandler


[logger_nds.websocket]
level=DEBUG
handlers=consoleHandler
qualname=nds.websocket
propagate=0

[logger_nds.instances]
level=INFO
handlers=consoleHandler
qualname=nds.instances
propagate=0

[logger_nds.commands]
level=INFO
handlers=consoleHandler
qualname=nds.commands
propagate=0

[logger_nds.mirrors]
level=INFO
handlers=consoleHandler
qualname=nds.mirrors
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=simpleFormatter
args=(sys.stdout,)

[formatter_simpleFormatter]
format=%(asctime)s | %(name)s:%(levelname)s - %(message)s